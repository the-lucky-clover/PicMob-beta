# Cloudflare Pages Configuration
compatibility_date = "2024-11-01"

[build]
  command = "echo 'No build step required for static site'"
  publish = "web"

# Custom headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.workers.dev"

# Cache static assets
[[headers]]
  for = "*.{js,css,png,jpg,jpeg,gif,svg,ico,woff,woff2}"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# API redirects to worker
[[redirects]]
  from = "/api/*"
  to = "https://picmob-api.workers.dev/api/:splat"
  status = 200

# Username profile routing
[[redirects]]
  from = "/u/:username"
  to = "/index.html"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {path = "!*.{js,css,png,jpg,jpeg,gif,svg,ico,woff,woff2,txt,xml}"}

# Environment variables for Pages Functions (if needed)
[env.production.vars]
  ENVIRONMENT = "production"

[env.preview.vars]
  ENVIRONMENT = "preview"